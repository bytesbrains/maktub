name: Executor image

# The executor image was published by hand, so the Dockerfile on `main` and the
# image users actually `docker pull` drifted apart — the root-running, floating-base
# image of issue #15 stayed live for a month after the fix merged. This workflow
# closes that gap: every merge that touches executor/ republishes `:dev`.
#
# Deliberately NOT part of ci.yml — it needs registry credentials, and it must not
# run on fork PRs, where secrets are unavailable by design.

on:
  pull_request:
    branches: [main]
    paths:
      - "executor/**"
      - ".github/workflows/executor-image.yml"
  push:
    branches: [main]
    paths:
      - "executor/**"
      - ".github/workflows/executor-image.yml"
  # Cutting a durable version tag (e.g. 0.1.0-dev.3) stays a deliberate human act.
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Immutable version tag to publish alongside :dev (e.g. 0.1.0-dev.3). Leave empty to publish :dev only."
        required: false
        type: string

# A newer merge to main supersedes an in-flight build of the same ref. Never
# cancel a release run mid-push: a half-pushed manifest is worse than a slow one.
concurrency:
  group: executor-image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  executor-image:
    name: Executor image (build, verify, publish)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE: bytesbrains/maktub-executor
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Base image must be digest-pinned
        # GATING, and the direct regression test for issue #15: a bare `FROM node:20-slim`
        # means a re-tagged or compromised upstream lands silently in a published image.
        # Bumping the pin is fine; dropping it is not.
        run: |
          # EVERY stage, not just one: a multi-stage build whose builder stage is
          # unpinned is still a supply-chain hole, even though the stage is discarded —
          # the untrusted image runs `npm ci` on the runner. Stage aliases (FROM build)
          # are internal references, not registry pulls, so they're exempt — but only
          # when the alias is defined on an EARLIER line. Docker resolves a name
          # against the registry unless a prior stage defined it, so `FROM ubuntu`
          # before `FROM ... AS ubuntu` is an unpinned pull masquerading as a stage
          # reference and must fail the gate (issue #21). Hence a single sequential
          # pass, not global grep filtering: aliases only exempt lines below them.
          stages=$(grep -cE '^[[:space:]]*FROM[[:space:]]' executor/Dockerfile || true)
          if [ "$stages" -eq 0 ]; then
            echo "::error file=executor/Dockerfile::No FROM line found — refusing to publish an unverifiable image."
            exit 1
          fi
          unpinned=$(awk '
            {
              if (tolower($0) !~ /^[ \t]*from[ \t]/) next
              n = split($0, tok, /[ \t]+/)
              img = ""; alias = ""; seen_from = 0
              for (i = 1; i <= n; i++) {
                t = tok[i]
                if (t == "") continue                              # leading whitespace
                if (!seen_from) { if (tolower(t) == "from") seen_from = 1; continue }
                # Skip flags, but only in the `--flag=value` form — the only syntax
                # Docker accepts. A bare `--platform value` is a parse error, and by
                # NOT skipping it the bare flag becomes the "image", fails the digest
                # check, and the gate stays fail-closed on malformed FROM lines.
                if (img == "") { if (t ~ /^--[A-Za-z-]+=/) continue; img = t; continue }
                if (tolower(t) == "as" && i < n) alias = tolower(tok[i + 1])
              }
              # Exempt only references to stages already defined ABOVE this line
              # (stage names are case-insensitive) and the reserved built-in
              # `scratch` (an empty filesystem, never a registry pull); everything
              # else is a registry pull and must carry a digest.
              if (tolower(img) == "scratch") next
              # Digest test without a {64} interval expression: mawk builds older
              # than 2023 treat {64} as literal text, silently breaking the match
              # (issues #26/#27; the current runner mawk is fine, but the gate must
              # not depend on which awk it runs under). index/length/substr are
              # portable to every awk — and stricter than the old regex: exactly
              # 64 lowercase hex chars to the end of the token, not 64-or-more
              # anywhere inside it.
              pinned = 0
              p = index(img, "@sha256:")
              if (p > 0) {
                d = substr(img, p + 8)
                if (length(d) == 64 && d !~ /[^0-9a-f]/) pinned = 1
              }
              if (!(tolower(img) in defined) && !pinned) print
              if (alias != "") defined[alias] = 1
            }
          ' executor/Dockerfile)
          if [ -n "$unpinned" ]; then
            echo "::error file=executor/Dockerfile,line=1::Every base image must be pinned by digest — 'FROM image:tag@sha256:<digest>' (see issue #15). Unpinned:"
            printf '%s\n' "$unpinned"
            exit 1
          fi
          echo "All $stages FROM line(s) digest-pinned:"
          grep -E '^[[:space:]]*FROM[[:space:]]' executor/Dockerfile

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build (amd64) for verification
        # Single-arch and loaded into the local daemon so the next step can actually
        # run it. The multi-arch push below reuses this layer cache.
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: executor
          platforms: linux/amd64
          load: true
          tags: maktub-executor:verify
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image must not run as root
        # The other half of issue #15. The executor holds a hot PRIVATE_KEY in env,
        # so uid 0 in the container is a blast-radius we don't need to carry.
        run: |
          uid=$(docker run --rm --entrypoint id maktub-executor:verify -u)
          echo "Container uid: $uid"
          if [ "$uid" = "0" ]; then
            echo "::error file=executor/Dockerfile::Image runs as root. Add a 'USER node' directive (see issue #15)."
            exit 1
          fi

      - name: Image boots
        # Smoke test: with no .env the executor must reach its own config check and
        # reject the missing key. Anything else (module-not-found, permission denied
        # from the non-root switch) means the image is broken regardless of uid.
        #
        # COUPLING: the string below is asserted against the config error raised in
        # executor/src/config.js (normalizePrivateKey / assertConfig). It is matched
        # loosely — "PRIVATE_KEY" plus "missing" — so wording tweaks don't break the
        # gate, but if that error is renamed or removed, update this step in the same
        # PR. A gate that silently stops asserting is worse than no gate.
        run: |
          out=$(docker run --rm maktub-executor:verify node src/index.js --status 2>&1 || true)
          echo "$out"
          if ! echo "$out" | grep -qE 'PRIVATE_KEY.*(missing|malformed)'; then
            echo "::error::Executor did not reach its config check — the image is broken."
            exit 1
          fi

      # ---- Everything below publishes. PRs stop here. ----

      - name: Resolve published tags
        if: github.event_name != 'pull_request' && github.repository == 'bytesbrains/maktub'
        id: tags
        # version_tag arrives via env, never inlined as ${{ }} into the script body:
        # Actions substitutes expressions textually *before* the shell parses them, so
        # an inline value could close the quote and run arbitrary commands on a runner
        # that later holds registry credentials. Through env it is only ever data.
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          tags="${IMAGE}:dev,${IMAGE}:sha-${GITHUB_SHA::12}"
          version="$VERSION_TAG"
          if [ -n "$version" ]; then
            # Belt and braces: reject anything that isn't a legal Docker tag, so a
            # typo can't publish a junk tag and nothing odd reaches the registry.
            if ! printf '%s' "$version" | grep -qE '^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$'; then
              echo "::error::version_tag '$version' is not a valid Docker tag ([A-Za-z0-9_][A-Za-z0-9._-]*, max 128 chars)."
              exit 1
            fi
            tags="${tags},${IMAGE}:${version}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "Publishing: $tags"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && github.repository == 'bytesbrains/maktub'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64 + linux/arm64)
        # Multi-arch to match what the README promises. No `:latest` — the README
        # states there deliberately isn't one until mainnet.
        if: github.event_name != 'pull_request' && github.repository == 'bytesbrains/maktub'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: executor
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
