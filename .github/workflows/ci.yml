name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  contracts:
    name: Contracts (compile + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx hardhat compile
      - name: Unit tests (excluding live-network integration)
        run: |
          npx hardhat test \
            test/MaktubCore.*.test.js \
            test/MaktubFlash.*.test.js \
            test/ExecutorRewards.*.test.js \
            test/ExecutionRelay.*.test.js \
            test/MktbGovernance.test.js \
            test/MktbToken.test.js \
            test/RecipientRegistry.test.js \
            test/RecipientRegistryV2.test.js \
            test/SmartWallet.test.js \
            test/SmartWallet.webauthn.test.js \
            test/SmartWalletFactory.invariants.test.js

  sdk:
    name: SDK (build + typecheck + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  addresses:
    name: Generated addresses match deployments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Regenerate clients from deployments/base-sepolia.json
        run: node scripts/gen-addresses.mjs
      - name: Fail if any generated file is stale
        # The SDK carrier (sdk/deployments/base-sepolia.json), the SDK TS constants,
        # and the executor constants are all derived from deployments/base-sepolia.json.
        # A redeploy that edits the deployment record without regenerating — or a
        # hand-edit of a generated file — is exactly the address drift that orphans
        # users' letters. Regenerate in CI and fail on any diff.
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated address files are out of sync with deployments/base-sepolia.json. Run 'node scripts/gen-addresses.mjs' and commit."
            git --no-pager diff --stat
            git --no-pager diff
            exit 1
          fi
          echo "SDK carrier + SDK TS + executor addresses are in sync with deployments/base-sepolia.json."

  secrets-scan:
    name: Secrets scan (block committed private keys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject 64-hex private-key patterns in tracked files
        run: |
          # Looks for PRIVATE_KEY=0x{64 hex} committed to the repo.
          # Instructional placeholders in *.env.example are explicitly allowed.
          if git grep -nIE 'PRIVATE_KEY=0x[0-9a-fA-F]{64}' -- ':!*.env.example'; then
            echo "::error::A 64-hex private key pattern is present in a tracked file. Reject."
            exit 1
          fi
      - name: Reject tracked .env files
        run: |
          # .env must remain gitignored. Tracking one is always a mistake.
          tracked_env=$(git ls-files '*.env' || true)
          if [ -n "$tracked_env" ]; then
            echo "::error::A .env file is tracked in the repo:"
            echo "$tracked_env"
            exit 1
          fi

  invariants:
    name: Invariant tests (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # forge-std lives in lib/ as a submodule
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      # npm ci provides node_modules/@openzeppelin, which remappings.txt maps
      # `@openzeppelin/` onto — forge resolves the OZ imports through it.
      - run: npm ci
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge test (stateful invariant + fuzz)
        # GATING (unlike the report-only analysers): these are correctness
        # tests. A broken invariant — executed unwinding, staked principal
        # eaten by rewards, supply over cap — must fail the build.
        run: forge test -vv

  symbolic:
    name: Symbolic checks (Halmos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # forge-std lives in lib/ as a submodule
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      # npm ci provides node_modules/@openzeppelin, which remappings.txt maps
      # `@openzeppelin/` onto — halmos builds via forge, which resolves through it.
      - run: npm ci
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pinned: halmos is young and its symbolic-execution coverage shifts
      # between releases — an unpinned bump must not silently change what a
      # green run proves. Bump deliberately.
      - run: pip install halmos==0.3.3
      - name: halmos (symbolic proofs over fee curve, expiry gates, reward caps, pagination)
        # GATING, like the invariants job: each `check_` proves its property
        # for EVERY input value (Phase 3 of issue #6). The suites live in
        # test/halmos/ behind the `halmos` foundry profile; settings in
        # halmos.toml. `forge test` never runs them (check_ prefix).
        run: FOUNDRY_PROFILE=halmos halmos

  coverage:
    name: Coverage (solidity-coverage, full v3 tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Measure coverage over contracts/v3 (unit + system suites)
        # Instruments the whole v3 tree (see .solcover.js). Excludes the
        # live-Sepolia integration suite and the production ops scripts, which
        # need a funded network account.
        run: npm run coverage
      - name: Enforce coverage floors
        # GATING (issue #11): global + per-protocol-contract floors set just
        # under the recorded baseline, in scripts/coverage-floors.json. Floors
        # ratchet UP as gaps close, never down — add tests, don't lower floors.
        run: node scripts/check-coverage.mjs
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            coverage.json
          if-no-files-found: warn

  static-analysis:
    name: Static analysis (Slither)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Slither
        # GATING on Medium+ (issue #11). The four known-intentional High/Medium
        # findings (the smart wallet's owner-authorized execute-with-value, two
        # zero-sentinel equality checks, one partial tuple destructuring) are
        # triaged into slither.db.json at the repo root — Slither auto-loads it
        # and skips those result IDs, so only NEW Medium+ findings fail.
        # Version pinned + framework forced: the triage IDs hash the finding
        # descriptions, so an unpinned Slither (or an accidental forge build,
        # possible since foundry.toml exists) could invalidate the baseline.
        uses: crytic/slither-action@v0.4.0
        with:
          target: "."
          slither-version: "0.11.5"
          slither-args: "--compile-force-framework hardhat --filter-paths 'contracts/v3/mocks|node_modules'"
          fail-on: medium

  static-analysis-aderyn:
    name: Static analysis (Aderyn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Compile
        # Aderyn reads Hardhat build-info; compile explicitly so a compile error
        # surfaces here rather than as an opaque Aderyn failure.
        run: npx hardhat compile
      - name: Install Aderyn (prebuilt binary)
        uses: cargo-bins/cargo-binstall@main
      - name: Install Aderyn
        # Pinned (issue #11): the committed baseline was generated with 0.6.8,
        # and Aderyn's detector set shifts between releases — an unpinned bump
        # would gate PRs on tool churn, not code changes. Bump deliberately
        # (regenerate scripts/aderyn-baseline.json in the same PR).
        run: cargo binstall --no-confirm aderyn@0.6.8
      - name: Run Aderyn
        # Second static analyser alongside Slither — different detector set.
        # --src scopes analysis to contracts/v3 (matches hardhat paths.sources)
        # so Aderyn does not try to compile node_modules test mocks (e.g.
        # eth-gas-reporter's truffle fixtures); OZ imports still resolve via
        # remappings.txt. Mocks are excluded to match the Slither job's filter.
        # Markdown report for humans (artifact), JSON for the baseline gate.
        run: |
          aderyn . --src contracts/v3 -x contracts/v3/mocks -o aderyn-report.md --skip-update-check
          aderyn . --src contracts/v3 -x contracts/v3/mocks -o aderyn-report.json --skip-update-check
      - name: Enforce Aderyn baseline
        # GATING on NEW findings only (issue #11): Aderyn has no severity exit
        # code, so scripts/check-aderyn.mjs diffs the JSON report against the
        # committed, triaged scripts/aderyn-baseline.json — every baselined
        # finding sits in a deployed immutable contract and was reviewed as
        # intentional. New detector/file pairs or instance-count increases fail.
        run: node scripts/check-aderyn.mjs aderyn-report.json
      - name: Upload Aderyn report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aderyn-report
          path: aderyn-report.md
          # error (not warn): if Aderyn produced NO report at all (e.g. it
          # could not resolve imports), that is real breakage and must fail
          # the job rather than pass green with nothing.
          if-no-files-found: error
